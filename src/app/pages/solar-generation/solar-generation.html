<app-logged-in-layout>
  <div class="container fluid">
    <div class="row">
      <div class="col-12 mb-4">
        <div class="card">
          <div class="card-body">
        <h1 class="card-title">Solar Generation</h1>
        <p>Select a CSV file. Then choose the date and value columns from the grid.</p>
        <app-service-address-selector (addressSelected)="onAddressSelected($event)"></app-service-address-selector>
            <input type="file" (change)="onFileSelected($event)"/>
            @if (headers().length) {
              <table class="table table-sm">
                <thead><tr><th>Date</th><th>Value</th><th>Header</th></tr></thead>
                <tbody>
                  @for (h of headers(); track $index) {
                    <tr>
                      <td><input type="radio" name="dateCol" (change)="setDateColumn(h)" [checked]="selectedDateCol()===h"/></td>
                      <td><input type="radio" name="valueCol" (change)="setValueColumn(h)" [checked]="selectedValueCol()===h"/></td>
                      <td>{{h}}</td>
                    </tr>
                  }
                </tbody>
              </table>
              <button (click)="submitFile()" [disabled]="!selectedDateCol() || !selectedValueCol()">Parse CSV</button>
            }
            @if (data().length) {
              <h2>Parsed Data</h2>
              <table class="table table-sm">
                <thead><tr><th>Date</th><th>Value</th></tr></thead>
                <tbody>
                  @for (d of data(); track $index) {
                    <tr><td>{{d.date}}</td><td>{{d.value}}</td></tr>
                  }
                </tbody>
              </table>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
</app-logged-in-layout>
